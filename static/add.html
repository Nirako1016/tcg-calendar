<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>添加赛事 - TCG日历</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f6fa;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    max-width: 460px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #2d3436;
  }
  .sub {
    font-size: 13px;
    color: #b2bec3;
    margin-bottom: 24px;
  }
  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }
  .required::after {
    content: ' *';
    color: #e74c3c;
  }
  input, select {
    width: 100%;
    height: 46px;
    border: 1.5px solid #dfe6e9;
    border-radius: 10px;
    padding: 0 14px;
    font-size: 15px;
    color: #2d3436;
    background: #fafbfc;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #6c5ce7;
    background: #fff;
  }
  .date-row {
    display: flex;
    gap: 12px;
  }
  .date-row .field {
    flex: 1;
  }
  .btn {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active {
    transform: scale(0.97);
    opacity: 0.85;
  }
  .btn:disabled {
    opacity: 0.5;
    pointer-events: none;
  }
  .result {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .result.success {
    display: block;
    background: #e8f8ef;
    color: #1b7a4a;
    border: 1px solid #b7e4cf;
  }
  .result.error {
    display: block;
    background: #ffeaea;
    color: #c0392b;
    border: 1px solid #f5c6cb;
  }
  .hint {
    font-size: 12px;
    color: #b2bec3;
    margin-top: 4px;
  }
  .divider {
    text-align: center;
    color: #b2bec3;
    font-size: 12px;
    margin: 20px 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #dfe6e9;
  }
  .link-row {
    text-align: center;
    font-size: 14px;
  }
  .link-row a {
    color: #6c5ce7;
    text-decoration: none;
    font-weight: 500;
  }
  .help-box {
    background: #f8f9ff;
    border: 1px solid #e0e4ff;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 20px;
    font-size: 12px;
    color: #636e72;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="card">
  <h1>📅 添加赛事</h1>
  <p class="sub">填写赛事信息，提交后自动更新日历</p>

  <form id="eventForm">
    <div class="field">
      <label class="required">TCG 品类</label>
      <select id="tcgType" required>
        <option value="">请选择品类</option>
        <option value="宝可梦卡牌">宝可梦卡牌 (PTCG)</option>
        <option value="游戏王">游戏王 (YGO)</option>
        <option value="万智牌">万智牌 (MTG)</option>
        <option value="数码宝贝">数码宝贝 (DTCG)</option>
        <option value="海贼王">海贼王 (OPCG)</option>
        <option value="WS黑白双翼">WS黑白双翼</option>
        <option value="VG先导者">VG先导者</option>
        <option value="UA联合作战">UA联合作战</option>
        <option value="LORCANA">迪士尼洛卡纳 (LORCANA)</option>
        <option value="十二军团">十二军团 (12Legion)</option>
        <option value="其他">其他</option>
      </select>
      <p class="hint" id="customTypeHint" style="display:none">
        <input type="text" id="customType" placeholder="输入品类名称" style="margin-top:8px;height:38px;">
      </p>
    </div>

    <div class="field">
      <label class="required">赛事名称</label>
      <input type="text" id="eventName" placeholder="例如：上海公开赛、城市赛广州站" required maxlength="50">
    </div>

    <div class="date-row">
      <div class="field">
        <label class="required">开始日期</label>
        <input type="date" id="startDate" required>
      </div>
      <div class="field">
        <label class="required">结束日期</label>
        <input type="date" id="endDate" required>
      </div>
    </div>

    <div class="field">
      <label>城市</label>
      <input type="text" id="city" placeholder="例如：上海（可选）" maxlength="20">
    </div>

    <button type="submit" class="btn" id="submitBtn">🚀 提交并更新日历</button>
  </form>

  <div class="result" id="result"></div>

  <div class="divider">快速操作</div>
  <div class="link-row">
    <a href="/">📊 查看日历面板</a>
    <a href="/api/export">📥 导出Excel表格</a>
  </div>

  <div class="help-box">
    💡 <strong>提示：</strong>结束日期可以和开始日期相同（单天赛事）。<br>
    提交后约 2 分钟生效到 <a href="https://nirako1016.github.io/tcg-calendar/calendar.ics" style="color:#6c5ce7;">订阅链接</a>
  </div>
</div>

<script>
  // 品类选择联动
  document.getElementById('tcgType').addEventListener('change', function() {
    var hint = document.getElementById('customTypeHint');
    var input = document.getElementById('customType');
    if (this.value === '其他') {
      hint.style.display = 'block';
      input.required = true;
    } else {
      hint.style.display = 'none';
      input.required = false;
      input.value = '';
    }
  });

  // 结束日期默认与开始日期相同
  document.getElementById('startDate').addEventListener('change', function() {
    var end = document.getElementById('endDate');
    if (!end.value || end.value < this.value) {
      end.value = this.value;
    }
  });

  // 表单提交
  document.getElementById('eventForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var resultEl = document.getElementById('result');

    var tcgType = document.getElementById('tcgType').value;
    if (tcgType === '其他') {
      tcgType = document.getElementById('customType').value.trim();
    }
    if (!tcgType) {
      showResult('请选择或输入 TCG 品类', 'error');
      return;
    }

    var eventName = document.getElementById('eventName').value.trim();
    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var city = document.getElementById('city').value.trim();

    if (!eventName || !startDate || !endDate) {
      showResult('请填写所有必填项', 'error');
      return;
    }

    if (startDate > endDate) {
      showResult('开始日期不能晚于结束日期', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = '提交中...';
    resultEl.className = 'result';
    resultEl.style.display = 'none';

    try {
      var formData = new FormData();
      formData.append('tcg_type', tcgType);
      formData.append('event_name', eventName);
      formData.append('start_date', startDate);
      formData.append('end_date', endDate);
      formData.append('city', city);

      var resp = await fetch('/api/add-event-via-form', {
        method: 'POST',
        body: formData
      });
      var data = await resp.json();

      if (data.success) {
        var dates = data.event.start_date;
        if (data.event.end_date !== data.event.start_date) {
          dates += ' ~ ' + data.event.end_date;
        }
        var cityText = data.event.city ? ' · ' + data.event.city : '';
        showResult(
          '✅ 赛事已添加！<br><br>' +
          '<b>【' + data.event.tcg_type + '】' + data.event.event_name + '</b><br>' +
          '📅 ' + dates + cityText + '<br><br>' +
          '📋 当前共 ' + data.total + ' 场赛事<br>' +
          '📡 ' + data.sync_status,
          'success'
        );
        // 清空非品类字段
        document.getElementById('eventName').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('city').value = '';
      } else {
        showResult('❌ ' + data.message, 'error');
      }
    } catch (err) {
      showResult('网络错误，请重试', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 提交并更新日历';
    }
  });

  function showResult(msg, type) {
    var el = document.getElementById('result');
    el.innerHTML = msg;
    el.className = 'result ' + type;
    el.style.display = 'block';
  }
</script>
</body>
</html>
